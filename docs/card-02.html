<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <title>Knowledge Nexus Card 02</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-card: #111827;
      --bg-card-hover: #1a2333;
      --accent-purple: #6c63ff;
      --accent-cyan: #00d4ff;
      --accent-gold: #f5c56b;
      --text-primary: #f0f4ff;
      --text-muted: #8892a4;
      --border: #1e2d40;
      --glow-purple: rgba(108, 99, 255, 0.3);
      --glow-cyan: rgba(0, 212, 255, 0.3);
      --glow-gold: rgba(245, 197, 107, 0.22);
      --max-width: 1120px;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      width: 1200px;
      height: 1200px;
      overflow: hidden;
      margin: 0;
      color: var(--text-primary);
      background: var(--bg-primary);
      font-family: "Noto Sans JP", system-ui, sans-serif;
      line-height: 1.7;
    }

    .card {
      position: relative;
      width: 1200px;
      height: 1200px;
      padding: 60px;
      display: grid;
      grid-template-rows: 1fr auto;
      isolation: isolate;
      background:
        radial-gradient(circle at 18% 14%, var(--glow-purple), transparent 25rem),
        radial-gradient(circle at 82% 80%, var(--glow-cyan), transparent 28rem),
        var(--bg-primary);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent 72%);
      pointer-events: none;
    }

    .content {
      display: grid;
      align-content: center;
      gap: 54px;
      text-align: center;
    }

    h1 {
      width: 980px;
      margin: 0 auto;
      font-family: "Inter", "Noto Sans JP", system-ui, sans-serif;
      font-size: 80px;
      line-height: 1.12;
      font-weight: 700;
      letter-spacing: 0;
      background: linear-gradient(110deg, var(--accent-purple), var(--accent-cyan));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: gradientShift 4s ease infinite;
    }

    .flow {
      display: grid;
      grid-template-columns: 280px 58px 280px 58px 280px;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .node {
      width: 280px;
      height: 300px;
      padding: 20px 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent), var(--bg-card);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
      display: grid;
      place-items: center;
      text-align: center;
    }

    .node.ai {
      border: 2px solid var(--accent-purple);
      box-shadow: 0 0 32px var(--glow-purple), 0 18px 50px rgba(0, 0, 0, 0.22);
    }

    .emoji {
      display: block;
      font-size: 64px;
      line-height: 1;
      margin-bottom: 14px;
    }

    .node-title {
      margin: 0;
      color: var(--text-primary);
      font-size: 52px;
      font-weight: 700;
      line-height: 1.02;
    }

    .node-label {
      margin: 10px 0 0;
      color: var(--text-muted);
      font: 700 44px/1.08 "Inter", "Noto Sans JP", system-ui, sans-serif;
    }

    .arrow {
      color: var(--accent-cyan);
      font: 700 48px/1 "Inter", sans-serif;
      text-shadow: 0 0 18px var(--glow-cyan);
    }

    .caption {
      margin: 0 auto;
      max-width: 980px;
      color: var(--text-primary);
      font-size: 64px;
      font-weight: 700;
      line-height: 1.22;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 22px;
      border-top: 1px solid var(--accent-purple);
      color: var(--text-muted);
      font: 600 28px/1 "Inter", "Noto Sans JP", system-ui, sans-serif;
      letter-spacing: 0;
    }

    .brand { color: var(--text-primary); }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Knowledge Nexus promotional card">
    <section class="content">
      <h1>情報の海を泳ぐのは<br>AIの仕事。</h1>
      <div class="flow" aria-label="Knowledge Nexus information flow">
        <article class="node">
          <div>
            <span class="emoji">📎</span>
            <p class="node-title">生情報</p>
            <p class="node-label">Clippings</p>
          </div>
        </article>
        <div class="arrow" aria-hidden="true">→</div>
        <article class="node ai">
          <div>
            <span class="emoji">🤖</span>
            <p class="node-title">AI組織<br>6体</p>
            <p class="node-label">Agents</p>
          </div>
        </article>
        <div class="arrow" aria-hidden="true">→</div>
        <article class="node">
          <div>
            <span class="emoji">💎</span>
            <p class="node-title">あなたへ</p>
            <p class="node-label">Essence</p>
          </div>
        </article>
      </div>
      <p class="caption">あなたの岸で<br>エッセンスだけ受け取る</p>
    </section>
    <footer class="footer">
      <div class="brand">Knowledge Nexus</div>
      <div>github.com/EN3Project/knowledge-nexus</div>
    </footer>
  </main>
</body>
</html>
