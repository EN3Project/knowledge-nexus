<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <title>Knowledge Nexus Card 01</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-card: #111827;
      --bg-card-hover: #1a2333;
      --accent-purple: #6c63ff;
      --accent-cyan: #00d4ff;
      --accent-gold: #f5c56b;
      --text-primary: #f0f4ff;
      --text-muted: #8892a4;
      --border: #1e2d40;
      --glow-purple: rgba(108, 99, 255, 0.3);
      --glow-cyan: rgba(0, 212, 255, 0.3);
      --glow-gold: rgba(245, 197, 107, 0.22);
      --max-width: 1120px;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      width: 1200px;
      height: 1200px;
      overflow: hidden;
      margin: 0;
      color: var(--text-primary);
      background: var(--bg-primary);
      font-family: "Noto Sans JP", system-ui, sans-serif;
      line-height: 1.7;
    }

    .card {
      position: relative;
      width: 1200px;
      height: 1200px;
      padding: 60px;
      display: grid;
      grid-template-rows: 1fr auto;
      isolation: isolate;
      background:
        radial-gradient(circle at 18% 14%, var(--glow-purple), transparent 25rem),
        radial-gradient(circle at 82% 80%, var(--glow-cyan), transparent 28rem),
        var(--bg-primary);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent 72%);
      pointer-events: none;
    }

    .content {
      display: grid;
      align-content: center;
      gap: 42px;
      text-align: center;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: 48px;
      font-weight: 700;
      line-height: 1.2;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .panel {
      min-height: 690px;
      padding: 40px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent), var(--bg-card);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 28px;
      text-align: left;
    }

    .panel.after {
      border-color: var(--accent-purple);
      box-shadow: 0 0 32px var(--glow-purple), 0 18px 50px rgba(0, 0, 0, 0.22);
    }

    .label {
      margin: 0;
      color: var(--text-muted);
      font-family: "Inter", "Noto Sans JP", system-ui, sans-serif;
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
    }

    .after .label { color: var(--accent-cyan); }

    .steps {
      display: grid;
      align-content: center;
      gap: 30px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .steps li {
      display: grid;
      grid-template-columns: 68px 1fr;
      align-items: center;
      gap: 16px;
      min-height: 76px;
      color: var(--text-primary);
      font-size: 40px;
      font-weight: 700;
      line-height: 1.28;
    }

    .icon {
      display: grid;
      width: 68px;
      height: 68px;
      place-items: center;
      color: var(--accent-cyan);
      font-size: 48px;
      line-height: 1;
    }

    .arrow {
      color: var(--accent-cyan);
      display: block;
      min-height: 48px;
      font: 700 48px/1 "Inter", sans-serif;
      text-align: center;
      text-shadow: 0 0 18px var(--glow-cyan);
    }

    .result {
      margin: 0;
      font-size: 48px;
      font-weight: 700;
      line-height: 1.18;
    }

    .before .result { color: var(--accent-gold); }

    .after .result {
      background: linear-gradient(110deg, var(--accent-purple), var(--accent-cyan));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: gradientShift 4s ease infinite;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 22px;
      border-top: 1px solid var(--accent-purple);
      color: var(--text-muted);
      font: 600 28px/1 "Inter", "Noto Sans JP", system-ui, sans-serif;
      letter-spacing: 0;
    }

    .brand { color: var(--text-primary); }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Knowledge Nexus promotional card">
    <section class="content">
      <p class="subtitle">知識管理、変わった。</p>
      <div class="columns">
        <article class="panel before">
          <h1 class="label">Before</h1>
          <ul class="steps">
            <li><span class="icon">📄</span><span>記事を読む</span></li>
            <li><span class="icon">📝</span><span>メモを書く</span></li>
            <li><span class="icon">🗂</span><span>分類する</span></li>
            <li><span class="icon">🔍</span><span>後で探す</span></li>
          </ul>
          <p class="result">数時間 / 日</p>
        </article>
        <article class="panel after">
          <h1 class="label">After</h1>
          <ul class="steps">
            <li><span class="icon">📎</span><span>Clippings に入れる</span></li>
            <li class="arrow" aria-hidden="true">↓</li>
            <li><span class="icon">🤖</span><span>AI が処理</span></li>
            <li class="arrow" aria-hidden="true">↓</li>
            <li><span class="icon">💎</span><span>エッセンスだけ届く</span></li>
          </ul>
          <p class="result">要点がすぐ届く</p>
        </article>
      </div>
    </section>
    <footer class="footer">
      <div class="brand">Knowledge Nexus</div>
      <div>github.com/EN3Project/knowledge-nexus</div>
    </footer>
  </main>
</body>
</html>
