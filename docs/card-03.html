<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <title>Knowledge Nexus Card 03</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-card: #111827;
      --bg-card-hover: #1a2333;
      --accent-purple: #6c63ff;
      --accent-cyan: #00d4ff;
      --accent-gold: #f5c56b;
      --text-primary: #f0f4ff;
      --text-muted: #8892a4;
      --border: #1e2d40;
      --glow-purple: rgba(108, 99, 255, 0.3);
      --glow-cyan: rgba(0, 212, 255, 0.3);
      --glow-gold: rgba(245, 197, 107, 0.22);
      --max-width: 1120px;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      width: 1200px;
      height: 1200px;
      overflow: hidden;
      margin: 0;
      color: var(--text-primary);
      background: var(--bg-primary);
      font-family: "Noto Sans JP", system-ui, sans-serif;
      line-height: 1.7;
    }

    .card {
      position: relative;
      width: 1200px;
      height: 1200px;
      padding: 60px;
      display: grid;
      grid-template-rows: 1fr auto;
      isolation: isolate;
      background:
        radial-gradient(circle at 18% 14%, var(--glow-purple), transparent 25rem),
        radial-gradient(circle at 82% 80%, var(--glow-cyan), transparent 28rem),
        var(--bg-primary);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent 72%);
      pointer-events: none;
    }

    .content {
      display: grid;
      align-content: center;
      gap: 32px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-family: "Inter", "Noto Sans JP", system-ui, sans-serif;
      font-size: 88px;
      line-height: 1.08;
      font-weight: 700;
      letter-spacing: 0;
      background: linear-gradient(110deg, var(--accent-purple), var(--accent-cyan));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: gradientShift 4s ease infinite;
    }

    .agents {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .agent {
      height: 340px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent), var(--bg-card);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
      display: grid;
      grid-template-rows: 142px auto auto;
      justify-items: center;
      align-items: center;
      overflow: hidden;
    }

    .agent img {
      width: 120px;
      height: 142px;
      object-fit: contain;
      object-position: center bottom;
      filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.16));
    }

    .name {
      margin: 18px 0 8px;
      color: var(--text-primary);
      font-family: "Inter", "Noto Sans JP", system-ui, sans-serif;
      font-size: 40px;
      font-weight: 700;
      line-height: 1.05;
      text-align: center;
    }

    .role {
      margin: 0;
      color: var(--text-muted);
      font-size: 40px;
      font-weight: 700;
      line-height: 1.15;
      text-align: center;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 22px;
      border-top: 1px solid var(--accent-purple);
      color: var(--text-muted);
      font: 600 28px/1 "Inter", "Noto Sans JP", system-ui, sans-serif;
      letter-spacing: 0;
    }

    .brand { color: var(--text-primary); }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Knowledge Nexus promotional card">
    <section class="content">
      <h1>6体のエージェントが<br>裏で動く</h1>
      <div class="agents" aria-label="Knowledge Nexus agents">
        <article class="agent">
          <img src="assets/librarian-clean.png" alt="">
          <p class="name">司書</p>
          <p class="role">検索・分類</p>
        </article>
        <article class="agent">
          <img src="assets/investigator-clean.png" alt="">
          <p class="name">調査員</p>
          <p class="role">外部Web収集</p>
        </article>
        <article class="agent">
          <img src="assets/analyst-clean.png" alt="">
          <p class="name">分析官</p>
          <p class="role">構造抽出</p>
        </article>
        <article class="agent">
          <img src="assets/critic-clean.png" alt="">
          <p class="name">査読官</p>
          <p class="role">根拠検証</p>
        </article>
        <article class="agent">
          <img src="assets/scribe-clean.png" alt="">
          <p class="name">書記官</p>
          <p class="role">整形・保存</p>
        </article>
        <article class="agent">
          <img src="assets/curator-clean.png" alt="">
          <p class="name">学芸員</p>
          <p class="role">リンク維持</p>
        </article>
      </div>
    </section>
    <footer class="footer">
      <div class="brand">Knowledge Nexus</div>
      <div>github.com/EN3Project/knowledge-nexus</div>
    </footer>
  </main>
</body>
</html>
